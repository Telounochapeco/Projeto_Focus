<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Botão Liga/Desliga</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="cor.css"> 
</head>
                <body> 
                    <div class="position-relative" style="background-color: rgb(49, 95, 194); height: 200px;">

                        <div class="d-flex flex-column justify-content-center align-items-center h-100">
                            <label class="switch">
                            <input type="checkbox" id="toggleSwitch">
                            <span class="slider"></span>
                            </label>
                            <p id="status" class="mt-3 text-white">Desligado</p>
                        </div>

                        <div class="position-absolute top-0 end-0 p-3">
                            <button type="button" class="btn-close" disabled aria-label="Close"></button>
                        </div>

                    </div>

                <script>
                const toggle = document.getElementById('toggleSwitch');
                const status = document.getElementById('status');
                toggle.addEventListener('change', () => {
                    status.textContent = toggle.checked ? 'Ligado' : 'Desligado';
                });
                </script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
